services:
  fack-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://fulcry.xyz/api}
        NEXT_PUBLIC_API_TIMEOUT: ${NEXT_PUBLIC_API_TIMEOUT:-60000}
    container_name: fack-frontend
    ports:
      - "3000:3000"  # Restored for direct access
    restart: unless-stopped